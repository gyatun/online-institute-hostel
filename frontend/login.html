<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Hostel Management System</title>
  <style>
    /* NOTE: It's best practice to move this CSS to styles.css, 
       but keeping it here for simplicity now. */
    body {
      font-family: Arial, sans-serif;
      background: #007BFF; /* Used primary color */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 8px 20px rgba(0,0,0,0.3);
      width: 350px;
      text-align: center;
    }
    h2 {
      margin-bottom: 25px;
      color: #004080;
    }
    select, input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
      box-sizing: border-box; /* Important for padding/width calculation */
    }
    button {
      width: 100%;
      padding: 12px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
      margin-top: 15px;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #0056b3;
    }
    p {
        margin-top: 15px;
        font-size: 0.9em;
    }
    p a {
        color: #007BFF;
        text-decoration: none;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Hostel Portal Login</h2>
    
    <form id="loginForm"> 

      <select id="role" name="role" required>
        <option value="" disabled selected>Select Your Role</option>
        <option value="student">Student</option>
        <option value="warden">Warden</option>
        <option value="staff">Hostel Staff</option>
        <option value="admin">Admin</option>
      </select>
      
      <input type="text" id="username" name="username" placeholder="Username (Roll No. for Student)" required>
      <input type="password" id="password" name="password" placeholder="Password" required>
      
      <button type="submit">Login</button>
    </form>
    
    <p>
        Don't have a student account? <a href="register.html">Register Here</a>
    </p>
  </div>

  <script src="auth.js"></script>

</body>
</html>
